<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tales — live supervision</title>
<style>
  :root {
    --bg: #0a0c0f; --panel: #11151b; --panel2: #161b22; --line: #232a33;
    --text: #e6edf3; --dim: #8b949e; --cyan: #38d9ff; --magenta: #d98cff;
    --green: #3fe08f; --amber: #ffcf6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, #11151b, #0d1014);
  }
  header .brand { font-weight: 700; letter-spacing: .3px; }
  header .brand b { color: var(--cyan); }
  header .task { color: var(--dim); font-size: 13px; }
  header .phase {
    margin-left: auto; font-size: 12px; color: var(--amber);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 760px; }
  .msg .who { font: 600 12px ui-monospace, monospace; margin-bottom: 4px; }
  .msg .body {
    white-space: pre-wrap; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 13px;
  }
  .msg.claude .who { color: var(--cyan); }
  .msg.claude .body { border-color: #1c3a44; }
  .msg.codex .who { color: var(--magenta); }
  .msg.codex .body { border-color: #382044; }
  .msg.you { align-self: flex-end; }
  .msg.you .who { color: var(--green); text-align: right; }
  .msg.you .body { background: #10241a; border-color: #1d4231; }
  .note { color: var(--dim); font-size: 12.5px; font-style: italic; }
  .note.rec { color: var(--amber); font-style: normal; font-weight: 600; }
  .note.fatal { color: #ff7b72; font-style: normal; }
  .streaming .body::after { content: "▋"; color: var(--dim); }
  #gate {
    display: none; padding: 12px 20px; gap: 10px; align-items: center;
    border-top: 1px solid var(--line); background: #0d1610;
  }
  #gate.show { display: flex; }
  #gate .label { color: var(--green); font-weight: 600; }
  #gate select, #gate button { font: inherit; }
  #gate select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 10px;
  }
  button {
    cursor: pointer; border-radius: 8px; padding: 7px 14px; font-weight: 600;
    border: 1px solid var(--line); background: var(--panel2); color: var(--text);
  }
  button.go { background: #11351f; border-color: #1f6f3f; color: var(--green); }
  button.no { background: #2a1414; border-color: #6f2f2f; color: #ff9b94; }
  footer {
    display: flex; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--line);
    background: #0d1014;
  }
  #input {
    flex: 1; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 14px; font: inherit; outline: none;
  }
  #input:focus { border-color: var(--cyan); }
  .hint { color: var(--dim); font-size: 12px; padding: 0 20px 10px; }
</style>
</head>
<body>
  <header>
    <span class="brand"><b>Tales</b> · live supervision</span>
    <span class="task" id="task"></span>
    <span class="phase" id="phase">connecting…</span>
  </header>

  <div id="log"></div>

  <div id="gate">
    <span class="label">⏸ Your call — who should execute?</span>
    <select id="executor"></select>
    <button class="go" id="confirm">Approve &amp; run</button>
    <button class="no" id="reject">Reject</button>
  </div>

  <footer>
    <input id="input" placeholder="Type to talk to them (you're in the loop)…  Enter to send" autofocus />
    <button id="send">Send</button>
  </footer>
  <div class="hint">You're a participant: anything you type is folded into the conversation. At the gate, pick an executor and approve — nothing runs until you do.</div>

<script>
(function () {
  const log = document.getElementById('log');
  const phaseEl = document.getElementById('phase');
  const taskEl = document.getElementById('task');
  const gate = document.getElementById('gate');
  const execSel = document.getElementById('executor');
  const input = document.getElementById('input');

  const labels = {};          // agentId -> label
  const streaming = {};        // agentId -> bubble element being streamed
  let recommended = null;
  const candidates = new Set();

  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => (phaseEl.textContent = 'idle');
  ws.onclose = () => (phaseEl.textContent = 'disconnected');

  function atBottom() { return log.scrollHeight - log.scrollTop - log.clientHeight < 80; }
  function scroll() { log.scrollTop = log.scrollHeight; }

  function labelOf(id) { return labels[id] || '?'; }
  function cls(label) {
    const l = (label || '').toLowerCase();
    return l === 'claude' || l === 'codex' ? l : '';
  }

  function bubble(label, text, who) {
    const stick = atBottom();
    const el = document.createElement('div');
    el.className = 'msg ' + (who || cls(label));
    el.innerHTML = `<div class="who"></div><div class="body"></div>`;
    el.querySelector('.who').textContent = who === 'you' ? 'you' : label;
    el.querySelector('.body').textContent = text || '';
    log.appendChild(el);
    if (stick) scroll();
    return el;
  }
  function note(text, extra) {
    const stick = atBottom();
    const el = document.createElement('div');
    el.className = 'note ' + (extra || '');
    el.textContent = text;
    log.appendChild(el);
    if (stick) scroll();
  }

  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    switch (m.kind) {
      case 'log':
        if (m.level === 'task') { taskEl.textContent = m.msg; break; }
        if (m.level === 'done') { note('run finished: ' + m.msg); break; }
        note(m.msg);
        break;
      case 'agent':
        labels[m.agent] = m.label; candidates.add(m.label);
        note('● ' + m.label + ' joined');
        break;
      case 'phase':
        phaseEl.textContent = m.phase;
        if (m.phase !== 'awaitingconfirmation') gate.classList.remove('show');
        break;
      case 'token': {
        let b = streaming[m.agent];
        if (!b) { b = bubble(labelOf(m.agent), ''); b.classList.add('streaming'); streaming[m.agent] = b; }
        const stick = atBottom();
        b.querySelector('.body').textContent += m.text;
        if (stick) scroll();
        break;
      }
      case 'message': {
        const b = streaming[m.agent];
        if (b) { b.classList.remove('streaming'); b.querySelector('.body').textContent = m.text; delete streaming[m.agent]; }
        else bubble(labelOf(m.agent), m.text);
        break;
      }
      case 'user': bubble('you', m.text, 'you'); break;
      case 'tool': note('⚙ ' + labelOf(m.agent) + ': ' + m.summary); break;
      case 'turn_done':
        if (m.cost != null) note('   turn cost $' + Number(m.cost).toFixed(4));
        if (streaming[m.agent]) { streaming[m.agent].classList.remove('streaming'); delete streaming[m.agent]; }
        break;
      case 'recommendation':
        recommended = m.executor;
        note('★ Recommended executor: ' + m.executor + '\n' + m.rationale, 'rec');
        break;
      case 'awaiting':
        execSel.innerHTML = '';
        [...candidates].forEach((c) => {
          const o = document.createElement('option');
          o.value = c; o.textContent = c;
          if (c === recommended) o.selected = true;
          execSel.appendChild(o);
        });
        gate.classList.add('show');
        scroll();
        break;
      case 'exited': note('● ' + labelOf(m.agent) + ' exited'); break;
      case 'fatal': note('✗ ' + m.msg, 'fatal'); break;
    }
  };

  function send() {
    const text = input.value.trim();
    if (!text) return;
    ws.send(JSON.stringify({ kind: 'say', text }));
    input.value = '';
  }
  document.getElementById('send').onclick = send;
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

  document.getElementById('confirm').onclick = () => {
    ws.send(JSON.stringify({ kind: 'confirm', executor: execSel.value || recommended }));
    gate.classList.remove('show');
  };
  document.getElementById('reject').onclick = () => {
    ws.send(JSON.stringify({ kind: 'reject' }));
    gate.classList.remove('show');
  };
})();
</script>
</body>
</html>
